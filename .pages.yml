media:
  input: public/images
  output: /images
content:
  - name: news
    label: 新闻
    type: collection
    path: content/news
    fields:
      - { name: title, label: 标题, type: string }
      - { name: date, label: 日期, type: date }
      - { name: body, label: 正文, type: rich-text }
  - name: products
    label: 产品
    type: collection
    path: content/products
    fields:
      - { name: title, label: 名称, type: string }
      - { name: image, label: 图片, type: image }
      - { name: body, label: 说明, type: rich-text }